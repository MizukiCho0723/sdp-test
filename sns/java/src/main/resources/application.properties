# DB (config.php 相当)
sns.db.path=/var/www/sns_data/db/OrderManage.db
sns.domain=shibaura-it.ac.jp

# Spring DataSource
spring.datasource.url=jdbc:sqlite:${sns.db.path}
spring.datasource.driver-class-name=org.sqlite.JDBC

# セッション設定 (config.php SESSION_LIFETIME 相当)
server.servlet.session.timeout=3600s
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# JSON は UTF-8
spring.mvc.charset-encoding.force=true
server.servlet.encoding.charset=UTF-8

# タイムゾーン
spring.jackson.time-zone=Asia/Tokyo

# 静的ファイル配信 (sns/public/ を Web ルートとして提供)
# mvn spring-boot:run は sns/java/ から実行するため ../public/ を指定
spring.web.resources.static-locations=file:../public/,classpath:/static/

# /api/** 以外はすべて index.html にフォールバック (SPA 対応)
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
