let _pass = 0, _fail = 0;
const _out = document.getElementById('output');

function section(name) {
  const h = document.createElement('h2');
  h.textContent = name;
  _out.appendChild(h);
}

function test(desc, fn) {
  try {
    fn();
    _pass++;
    const pre = document.createElement('pre');
    pre.className = 'pass';
    pre.textContent = '  ✓ ' + desc;
    _out.appendChild(pre);
  } catch (e) {
    _fail++;
    const pre = document.createElement('pre');
    pre.className = 'fail';
    pre.textContent = '  ✗ ' + desc + '\n      → ' + e.message;
    _out.appendChild(pre);
  }
}

function assert(cond, msg) {
  if (!cond) throw new Error(msg || 'assertion failed');
}
function assertEqual(a, b) {
  const as = JSON.stringify(a), bs = JSON.stringify(b);
  if (as !== bs) throw new Error(`期待: ${bs}  実際: ${as}`);
}

function esc(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function gradeLabel(g) {
  const map = { 0: '職員', 1: '学部1年', 2: '学部2年', 3: '学部3年', 4: '学部4年',
    5: '修士1年', 6: '修士2年', 7: '博士1年', 8: '博士2年', 9: '博士3年', 10: '博士4年', 11: '教員' };
  return map[g] || '不明';
}

function avatarEl(name, cls = '') {
  const letter = (name || '?')[0].toUpperCase();
  const colors = ['#1877f2', '#e41e3f', '#1a7a1a', '#e67e22', '#8e44ad'];
  const c = colors[letter.charCodeAt(0) % colors.length];
  return `<div class="avatar ${cls}" style="background:${c}">${letter}</div>`;
}

function timeAgo(dateStr) {
  const d = new Date(dateStr.replace(' ', 'T') + 'Z');
  const diff = (Date.now() - d.getTime()) / 1000;
  if (diff < 60) return 'たった今';
  if (diff < 3600) return `${Math.floor(diff / 60)}分前`;
  if (diff < 86400) return `${Math.floor(diff / 3600)}時間前`;
  return `${Math.floor(diff / 86400)}日前`;
}

function getGradeCat(grade) {
  const g = parseInt(grade);
  if ([1, 2, 3, 4, 11].includes(g)) return 'faculty';
  if ([5, 6].includes(g)) return 'masters';
  if ([7, 8, 9, 10].includes(g)) return 'doctoral';
  if (g === 0) return 'staff';
  return null;
}

function getAllLabsForFaculty(faculty) {
  const courseData = SHOZOKU_COURSES[faculty];
  if (!courseData) return [];
  const keys = Array.isArray(courseData) ? courseData
    : Object.entries(courseData).flatMap(([dept, courses]) => courses.map(c => dept + ' - ' + c));
  return keys.flatMap(k => LAB_DATA[k] || []);
}

function getCourseKeyForLab(labValue) {
  for (const [key, labs] of Object.entries(LAB_DATA)) {
    if (labs.includes(labValue)) return key;
  }
  return null;
}

function getFacultyForCourseKey(courseKey) {
  for (const [faculty, courseData] of Object.entries(SHOZOKU_COURSES)) {
    if (Array.isArray(courseData)) {
      if (courseData.includes(courseKey)) return faculty;
    } else {
      for (const [dept, courses] of Object.entries(courseData)) {
        if (courses.some(c => dept + ' - ' + c === courseKey)) return faculty;
      }
    }
  }
  return null;
}

// ---- c1_m3_auth_mediator.js より ----
function AuthenticateMediator(screen_id, form_data) {
  switch (screen_id) {
    case 'W1':
      if (!form_data.email)
        return { result: false, error_message: '学籍番号が存在しません' };
      if (!form_data.email.endsWith('@shibaura-it.ac.jp'))
        return { result: false, error_message: '学籍番号が存在しません' };
      break;
    case 'W2':
      if (!form_data.password)
        return { result: false, error_message: 'パスワードが入力されていません．' };
      if (form_data.password.length < 8 || form_data.password.length > 16)
        return { result: false, error_message: 'パスワードは8〜16文字で入力してください' };
      if (!/[a-zA-Z]/.test(form_data.password) || !/[0-9]/.test(form_data.password))
        return { result: false, error_message: 'パスワードには英数字記号すべてが含まれている必要があります．' };
      if (form_data.password !== form_data.confirm)
        return { result: false, error_message: 'パスワードが一致しません．' };
      break;
    case 'W5':
      if (!form_data.email)
        return { result: false, error_message: 'IDが入力されていません．' };
      if (!form_data.password)
        return { result: false, error_message: 'パスワードが入力されていません．' };
      break;
    case 'W6':
      if (!form_data.email)
        return { result: false, error_message: '学籍番号が入力されていません．' };
      if (!form_data.email.endsWith('@shibaura-it.ac.jp'))
        return { result: false, error_message: '学籍番号が存在しません' };
      break;
    case 'W7':
      if (!form_data.code)
        return { result: false, error_message: '学籍番号が入力されていません' };
      if (!form_data.password)
        return { result: false, error_message: '新しいパスワードが入力されていません．' };
      if (!form_data.confirm)
        return { result: false, error_message: 'もう一度入力にも入力してください．' };
      if (form_data.password !== form_data.confirm)
        return { result: false, error_message: 'パスワードが異なっています．' };
      break;
  }
  return { result: true, error_message: '' };
}

// ---- c1_m5_post_mediator.js より ----
function PostDataMediator(user_id, content, target_post_id) {
  const isReply = target_post_id !== null && target_post_id !== undefined;
  if (!content || content.trim() === '') {
    return {
      is_success: false,
      error_message: isReply
        ? '返信内容を入力してください．'
        : '投稿内容を入力してください．',
    };
  }
  if (new Blob([content]).size > 1024) {
    return {
      is_success: false,
      error_message: isReply
        ? '返信内容は 1024 バイト以下（全角約 340 文字以内）にしてください．'
        : '投稿内容は 1024 バイト以下（全角約 340 文字以内）にしてくだい．',
    };
  }
  return { is_success: true, error_message: '' };
}

// ---- c1_m7_profile_mediator.js より ----
function ProfileDataMediator(action_type, profile_data) {
  switch (action_type) {
    case 'initial': return _validateInitialProfile(profile_data);
    case 'update':  return _validateUpdateProfile(profile_data);
    default:        return { status: 'error', message: '不正なアクション' };
  }
}
function _validateInitialProfile({ last_name, grade }) {
  if (!last_name || last_name.trim() === '')
    return { status: 'error', message: '氏名を入力してください．' };
  if (grade === '' || grade === null || grade === undefined)
    return { status: 'error', message: '学年/職員欄を選択してください．' };
  return { status: 'ok' };
}
function _validateUpdateProfile({ last_name, first_name, bio }) {
  if (!last_name || last_name.trim() === '')
    return { status: 'error', message: '名前（姓）を入力してください（名前は必須項目です）' };
  if (new Blob([last_name + ' ' + (first_name || '')]).size > 64)
    return { status: 'error', message: '名前は 64 バイト以下（全角約 21 文字以内）にしてください．' };
  if (bio && new Blob([bio]).size > 1024)
    return { status: 'error', message: '自己紹介は 1024 バイト以下（全角約 340 文字以内）にしてください．' };
  return { status: 'ok' };
}

// ---- c1_m1_router.js より (DOM スタブ付き) ----
let currentUserId = null, currentPage = 'timeline', prevPage = null;
let chatPartnerId = null, chatInterval = null;

// RouterMain が呼び出す関数のスタブ
const loadTimeline = () => {}, loadPartners = () => {}, loadNotifications = () => {};
const loadMyProfile = () => {}, loadPostDetail = () => {}, openChat = () => {};
const loadOtherProfile = () => {}, loadEditProfile = () => {}, startNotifPolling = () => {};
const showError = (msg) => {};

// 最低限のDOM要素をスクリプト内で生成してルーターをテスト
const _pages = ['timeline','search','messages','notifications','myprofile',
                'postDetail','chat','otherProfile','editProfile'];
_pages.forEach(p => {
  const d = document.createElement('div');
  d.id = 'page' + p.charAt(0).toUpperCase() + p.slice(1);
  d.className = 'page';
  if (p === 'search') {
    const sr = document.createElement('div'); sr.id = 'searchResults'; d.appendChild(sr);
  }
  document.body.appendChild(d);
});

function RouterMain(request_url, extra = {}) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pageEl = document.getElementById('page' + request_url.charAt(0).toUpperCase() + request_url.slice(1));
  if (!pageEl) { showError('ページが見つかりません'); return 0; }
  pageEl.classList.add('active');
  if (chatInterval && request_url !== 'chat') { clearInterval(chatInterval); chatInterval = null; }
  prevPage = currentPage;
  currentPage = request_url;
  if (request_url === 'timeline')      loadTimeline();
  if (request_url === 'search')        document.getElementById('searchResults').innerHTML = '';
  if (request_url === 'messages')      loadPartners();
  if (request_url === 'notifications') loadNotifications();
  if (request_url === 'myprofile')     loadMyProfile();
  if (request_url === 'postDetail'    && extra.postId)    loadPostDetail(extra.postId);
  if (request_url === 'chat'          && extra.partnerId) openChat(extra.partnerId);
  if (request_url === 'otherProfile'  && extra.userId)    loadOtherProfile(extra.userId);
  if (request_url === 'editProfile')   loadEditProfile();
  return 1;
}

// ---- timeAgo() ----
section('c1_shared.js ▶ timeAgo()  相対時刻表示');
function isoNow(offsetSec) {
  // timeAgo() は 'Z' 付きで UTC として解析するため、UTC 文字列を生成する
  return new Date(Date.now() - offsetSec * 1000).toISOString().replace('T', ' ').slice(0, 19);
}
test('30秒前 → たった今', () => assertEqual(timeAgo(isoNow(30)), 'たった今'));
test('5分前 → 5分前', () => assertEqual(timeAgo(isoNow(300)), '5分前'));
test('59分前 → 59分前', () => assertEqual(timeAgo(isoNow(59 * 60)), '59分前'));
test('1時間前 → 1時間前', () => assertEqual(timeAgo(isoNow(3600)), '1時間前'));
test('3時間前 → 3時間前', () => assertEqual(timeAgo(isoNow(3 * 3600)), '3時間前'));
test('1日前 → 1日前', () => assertEqual(timeAgo(isoNow(86400)), '1日前'));
test('7日前 → 7日前', () => assertEqual(timeAgo(isoNow(7 * 86400)), '7日前'));

test('正常投稿 → 成功', () => assertEqual(PostDataMediator(1, 'こんにちは！', null).is_success, true));

  assert(!PostDataMediator(1, 'あ'.repeat(400), null).is_success); // 1200バイト超

  assert(PostDataMediator(1, '', 5).error_message.includes('返信'));
});
